<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo Rewards</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #0f0f0f);
      color: var(--tg-theme-text-color, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }

    .card {
      background: var(--tg-theme-secondary-bg-color, #1c1c1c);
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      width: 80%;
      max-width: 320px;
    }

    button {
      margin-top: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #2ea6ff;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>🚀 Solo Rewards</h2>
    <p>Mini App работает</p>

    <button onclick="sendData()">Отправить в бот</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();

    function sendData() {
      tg.sendData(JSON.stringify({
        action: "test_click",
        time: Date.now()
      }));
    }
  </script>
</body>
</html>
