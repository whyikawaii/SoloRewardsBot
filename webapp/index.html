<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solo Rewards</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:#fff}
.wrap{max-width:420px;margin:auto;padding:20px}
.card{background:#1e293b;border-radius:24px;padding:20px;margin-bottom:16px}
.balance{font-size:52px;font-weight:700}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1>🏆 Solo Rewards</h1>
<p>Telegram Mini App</p>
<div class="balance" id="bal">100</div>
</div>
<div class="card">
<button class="btn" onclick="earn()">Claim +10</button>
</div>
</div>
<script>
if(window.Telegram?.WebApp){Telegram.WebApp.expand();}
function earn(){
 const el=document.getElementById('bal');
 el.innerText=Number(el.innerText)+10;
}
</script>
</body>
</html>
