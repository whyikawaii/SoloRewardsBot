<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Rewards</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0f1a, #111827);
  color: white;
}

/* TOP BAR */
.header {
  padding: 20px;
  text-align: center;
}

.title {
  font-size: 22px;
  font-weight: bold;
}

.xp {
  color: #00c2ff;
  margin-top: 5px;
}

/* CARDS */
.card {
  margin: 15px;
  padding: 15px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  color: white;
  background: linear-gradient(90deg, #00c2ff, #3b82f6);
  box-shadow: 0 0 15px rgba(0,194,255,0.3);
}

.btn:active {
  transform: scale(0.98);
}

/* SMALL TEXT */
.small {
  font-size: 13px;
  opacity: 0.7;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.nav button {
  flex: 1;
  padding: 12px;
  border: none;
  background: none;
  color: white;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🚀 Solo Rewards</div>
  <div class="xp">XP: <span id="xp">0</span></div>
</div>

<div class="card">
  <b>🎁 Ежедневная награда</b>
  <div class="small">Забирай раз в 24 часа</div>
  <button class="btn" onclick="claim()">Забрать</button>
</div>

<div class="card">
  <b>📌 Задания дня</b>
  <div class="small">Коммент + подписка</div>
  <button class="btn">Перейти к заданиям</button>
</div>

<div class="card">
  <b>👥 Рефералы</b>
  <div class="small">Приглашай друзей и получай XP</div>
  <button class="btn">Получить ссылку</button>
</div>

<div class="card">
  <b>🎁 Лутбоксы</b>
  <div class="small">Бесплатные и премиум</div>
  <button class="btn">Открыть магазин</button>
</div>

<div class="card">
  <b>🏆 Ладдер</b>
  <div class="small">Топ игроков недели</div>
  <button class="btn">Посмотреть рейтинг</button>
</div>

<div class="nav">
  <button>🏠</button>
  <button>🎯</button>
  <button>🎁</button>
  <button>🏆</button>
  <button>👤</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let xp = 0;
document.getElementById("xp").innerText = xp;

function claim() {
  xp += 10;
  document.getElementById("xp").innerText = xp;

  tg.sendData(JSON.stringify({
    action: "daily_claim",
    xp: 10
  }));
}
</script>

</body>
</html>
